<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Gastos - Burratto 3D</title>
    <link rel="stylesheet" href="burratto3d.css" />
  </head>
  <body>
    <div id="app-container">
      <nav class="sidebar">
        <h2>Burratto 3D</h2>
        <ul>
          <li><a href="dashboard.html">Dashboard</a></li>
          <li><a href="estoque.html">Estoque</a></li>
          <li><a href="calculadora.html">Calculadora</a></li>
          <li><a href="gastosdaempresa.html">Gastos</a></li>
          <li><a href="faturamento.html">Faturamento</a></li>
          <li><a href="login.html" class="logout-btn">Sair</a></li>
        </ul>
      </nav>

      <main class="content">
        <h1>Gastos Operacionais</h1>
        <div class="card">
          <form id="form-gastos" class="data-entry">
            <div class="field">
              <label for="gastos-despesa">Despesa</label>
              <input
                id="gastos-despesa"
                type="text"
                placeholder="Ex: Internet"
                required
              />
            </div>
            <div class="field">
              <label for="gastos-valor">Valor mensal (R$)</label>
              <input
                id="gastos-valor"
                type="text"
                placeholder="Ex: 80,00"
                required
              />
            </div>
            <button type="submit" class="btn btn-inline">Adicionar</button>
          </form>

          <table>
            <thead>
              <tr>
                <th>Despesa</th>
                <th>Valor Mensal</th>
              </tr>
            </thead>
            <tbody id="gastos-table-body">
              <tr>
                <td>Energia Elétrica</td>
                <td>R$ 80,00</td>
              </tr>
              <tr>
                <td>Manutenção</td>
                <td>R$ 50,00</td>
              </tr>
            </tbody>
          </table>

          <div class="totals">
            Total mensal: <span id="total-gastos">R$ 0,00</span>
          </div>
        </div>
      </main>
    </div>

    <script src="burratto.js"></script>
  </body>
</html>
